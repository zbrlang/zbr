name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: zbr
            asset_name: zbr

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: zbr
            asset_name: zbr-darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: zbr
            asset_name: zbr-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: zbr.exe
            asset_name: zbr.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: downloaded-binaries

      - name: Copy binaries into bin/
        run: |
          cp downloaded-binaries/zbr/zbr bin/zbr
          cp downloaded-binaries/zbr-darwin-x64/zbr bin/zbr-darwin-x64
          cp downloaded-binaries/zbr-darwin-arm64/zbr bin/zbr-darwin-arm64
          cp downloaded-binaries/zbr.exe/zbr.exe bin/zbr.exe
          chmod +x bin/zbr bin/zbr-darwin-x64 bin/zbr-darwin-arm64

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
